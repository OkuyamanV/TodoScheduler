<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Weekly Todo Notification</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/components.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    
    <style>
        /* ロゴ専用のリッチなグラデーションスタイル */
        .logo {
            font-family: 'Righteous', sans-serif;
            font-size: 1.8rem !important;
            font-weight: normal;
            background: linear-gradient(45deg, #0052D4, #4364F7, #6FB1FC);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.15));
            margin-top: 2px;
        }
        
        /* レスポンシブ対応：画面幅が狭い場合、週間スケジュールを横並びから縦並びに変更する */
        @media (max-width: 950px) {
            .week-grid {
                display: flex !important;
                flex-direction: column !important;
                gap: 15px;
            }
            .week-grid .day-column {
                min-height: auto !important;
                padding-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Todo Scheduler</div>
        <div class="header-controls">
            <button id="notify-setup"><span class="gear-icon">⚙</span> 設定</button>
        </div>
    </header>

    <main>
        <section id="section-current">
            <div class="current-section">
                <div class="section-header">
                    <h2 id="current-section-title">現在のTodo</h2>
                    <select id="current-view-mode" style="margin-left: auto; margin-right: 15px; padding: 6px 10px; border-radius: 4px; border: 1px solid #dadce0; font-size: 0.9rem; cursor: pointer; color: #202124; background-color: #fff; font-family: inherit; width: 100%; max-width: 150px; min-width: 95px; flex: 1;">
                        <option value="incomplete">未完了のタスク</option>
                        <option value="completed">完了済みのタスク</option>
                    </select>
                    <div class="controls">
                        <label><input type="radio" name="sort-current" value="start" checked> 開始順</label>
                        <label><input type="radio" name="sort-current" value="end"> 終了順</label>
                    </div>
                </div>
                <div id="current-list"></div>
            </div>
        </section>

        <section id="section-daily">
            <div class="current-section">
                <div class="section-header">
                    <h2>日間スケジュール設定</h2>
                    <div class="controls">
                        <label><input type="radio" name="sort-daily" value="start" checked> 開始順</label>
                        <label><input type="radio" name="sort-daily" value="end"> 終了順</label>
                    </div>
                </div>
                
                <div style="display: flex; gap: 6px; margin-bottom: 15px;" id="daily-header-days">
                    <button class="day-btn" data-idx="0">日</button>
                    <button class="day-btn" data-idx="1">月</button>
                    <button class="day-btn" data-idx="2">火</button>
                    <button class="day-btn" data-idx="3">水</button>
                    <button class="day-btn" data-idx="4">木</button>
                    <button class="day-btn" data-idx="5">金</button>
                    <button class="day-btn" data-idx="6">土</button>
                </div>

                <div id="daily-list-container"></div>
            </div>
        </section>

        <section id="section-schedule">
            <div class="schedule-section">
                <div class="section-header">
                    <h2>週間スケジュール設定</h2>
                    <div class="controls">
                        <label><input type="radio" name="sort-week" value="start" checked> 開始順</label>
                        <label><input type="radio" name="sort-week" value="end"> 終了順</label>
                    </div>
                </div>
                <div class="week-grid" id="week-grid"></div>
            </div>
        </section>
    </main>

    <div id="todo-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="modal-title" style="margin: 0;">Todoを設定</h3>
                <div id="time-error-msg" style="color: var(--danger-color, #ea4335); font-size: 0.75rem; line-height: 1.2; display: none; text-align: right; font-weight: bold;">
                    終了時間は開始時間よりも後に<br>設定する必要があります
                </div>
            </div>
            
            <div class="input-group">
                <label>Todo名 (最大30文字)</label>
                <input type="text" id="input-todo-name" placeholder="例：集中作業" maxlength="30">
            </div>
            
            <div class="time-picker-container">
                <div class="time-picker-block">
                    <label>開始時間</label>
                    <div class="wheel-wrapper">
                        <div class="wheel" id="start-hour"></div>
                        <span>:</span>
                        <div class="wheel" id="start-min"></div>
                    </div>
                </div>
                <div class="time-picker-block">
                    <label>終了時間</label>
                    <div class="wheel-wrapper">
                        <div class="wheel" id="end-hour"></div>
                        <span>:</span>
                        <div class="wheel" id="end-min"></div>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <label>時間設定</label>
                <select id="input-has-time">
                    <option value="true">あり（期間指定）</option>
                    <option value="false">なし（開始のみ）</option>
                </select>
            </div>

            <div class="input-group" id="task-type-group">
                <label>タイプ</label>
                <select id="input-task-type">
                    <option value="duration">時間経過</option>
                    <option value="check">チェック</option>
                </select>
            </div>

            <div class="input-group" id="notify-override-group">
                <label>個別通知設定</label>
                <select id="input-notify-override">
                    <option value="default">デフォルト</option>
                    <option value="all">全て通知</option>
                    <option value="start">開始時のみ通知</option>
                    <option value="end">終了時のみ通知</option>
                    <option value="none">通知なし</option>
                </select>
            </div>
            
            <div class="input-group hidden" id="carry-over-group">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold;">
                    <input type="checkbox" id="input-is-carry-over" style="width: auto;"> 翌日にタスクを持ち越す
                </label>
            </div>
            
            <div class="modal-actions">
                <button id="modal-cancel" class="secondary-btn">キャンセル</button>
                <button id="modal-save" class="primary-btn">保存する</button>
            </div>
        </div>
    </div> 
    
    <div id="day-copy-modal" class="modal-overlay">
        <div class="modal-content" style="width: 340px;">
            <h3>出現曜日の設定</h3>
            <div style="display: flex; justify-content: space-between; margin: 25px 0;" id="copy-day-buttons">
                <button class="day-btn" data-idx="0">日</button>
                <button class="day-btn" data-idx="1">月</button>
                <button class="day-btn" data-idx="2">火</button>
                <button class="day-btn" data-idx="3">水</button>
                <button class="day-btn" data-idx="4">木</button>
                <button class="day-btn" data-idx="5">金</button>
                <button class="day-btn" data-idx="6">土</button>
            </div>
            <div class="modal-actions">
                <button id="copy-cancel" class="secondary-btn">キャンセル</button>
                <button id="copy-save" class="primary-btn">保存する</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-content" style="width: 350px;">
            <h3 style="color: var(--danger-color); margin-top: 0;">削除の確認</h3>
            <p style="margin-bottom: 12px; font-weight: bold; color: #202124;">本当にこのTodoを削除しますか？</p>
            <div id="delete-modal-info" style="background: #f1f3f4; padding: 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; color: #3c4043; line-height: 1.6; white-space: pre-wrap;"></div>
            <div class="modal-actions">
                <button id="delete-cancel" class="secondary-btn">キャンセル</button>
                <button id="delete-confirm" class="primary-btn" style="background: var(--danger-color);">削除する</button>
            </div>
        </div>
    </div>

    <div id="full-complete-modal" class="modal-overlay">
        <div class="modal-content" style="width: 350px;">
            <h3 style="color: var(--complete-text); margin-top: 0; font-weight: bold;">完全完了しますか？</h3>
            <div id="full-complete-modal-info" ...></div>
            <div class="modal-actions">
                <button id="full-complete-cancel" class="secondary-btn">キャンセル</button>
                <button id="full-complete-confirm" class="primary-btn" style="background: var(--complete-color); color: white; font-weight: bold;">完全完了</button>
            </div>
        </div>
    </div>

    <div id="all-full-complete-modal" class="modal-overlay">
        <div class="modal-content" style="width: 350px;">
            <h3 style="color: var(--complete-color); margin-top: 0; font-weight: bold;">全て完全完了しますか？</h3>
            <div id="all-full-complete-modal-info" style="background: #f1f3f4; padding: 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; color: #3c4043; line-height: 1.6; max-height: 200px; overflow-y: auto; white-space: pre-wrap;"></div>
            <div class="modal-actions">
                <button id="all-full-complete-cancel" class="secondary-btn">キャンセル</button>
                <button id="all-full-complete-confirm" class="primary-btn" style="background: var(--complete-color); color: white; font-weight: bold;">完全完了</button>
            </div>
        </div>
    </div>

    <div id="notify-settings-modal" class="modal-overlay">
        <div class="modal-content" style="width: 390px; max-height: 85vh; overflow-y: auto;">
            <h3 style="margin-top: 0; border-bottom: 1px solid #dadce0; padding-bottom: 10px; color: #202124;">
                <span class="gear-icon" style="font-size: 1.25em; vertical-align: -0.06em;">⚙</span> 設定
            </h3>
            
            <h4 class="setting-section-title">通知設定</h4>
            
            <div class="input-group" style="margin-bottom: 12px;">
                <div class="setting-switch-row">
                    <span class="setting-item-label">タスク開始時の通知</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notify-start-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                    <select id="notify-start-sound" style="flex: 1;"></select>
                    <button id="btn-preview-start" class="secondary-btn" style="padding: 10px 15px; white-space: nowrap; font-size: 0.85rem;">▶ 試聴</button>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <div class="setting-switch-row">
                    <span class="setting-item-label">タスク終了時の通知</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notify-end-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                    <select id="notify-end-sound" style="flex: 1;"></select>
                    <button id="btn-preview-end" class="secondary-btn" style="padding: 10px 15px; white-space: nowrap; font-size: 0.85rem;">▶ 試聴</button>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 25px; border-bottom: 1px solid #dadce0; padding-bottom: 20px;">
                <label style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <span class="setting-item-label">通知音量</span>
                    <span id="notify-volume-value" style="font-size: 0.85rem; color: #5f6368; font-weight: normal;">50%</span>
                </label>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                    <span style="font-size: 1.1rem; line-height: 1;">🔈</span>
                    <input type="range" id="notify-volume" min="0" max="100" step="1" style="flex: 1; cursor: pointer; height: 6px;">
                    <span style="font-size: 1.1rem; line-height: 1;">🔊</span>
                </div>
            </div>

            <h4 class="setting-section-title">タスク完了設定</h4>

            <div class="input-group" style="margin-bottom: 14px;">
                <div class="setting-switch-row">
                    <span class="setting-item-label">タスク完了時のエフェクト</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="complete-effect-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 18px;">
                <div class="setting-switch-row">
                    <span class="setting-item-label">タスク完全完了時のエフェクト</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="full-complete-effect-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 14px;">
                <div class="setting-switch-row">
                    <span class="setting-item-label">タスク完了時のサウンド</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="complete-sound-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                    <select id="complete-sound-type" style="flex: 1;"></select>
                    <button id="btn-preview-complete" class="secondary-btn" style="padding: 10px 15px; white-space: nowrap; font-size: 0.85rem;">▶ 試聴</button>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <div class="setting-switch-row">
                    <span class="setting-item-label">タスク完全完了時のサウンド</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="full-complete-sound-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                    <select id="full-complete-sound-type" style="flex: 1;"></select>
                    <button id="btn-preview-full-complete" class="secondary-btn" style="padding: 10px 15px; white-space: nowrap; font-size: 0.85rem;">▶ 試聴</button>
                </div>
            </div>
            
            <div class="modal-actions" style="margin-top: 25px; border-top: 1px solid #dadce0; padding-top: 15px;">
                <button id="notify-cancel" class="secondary-btn">キャンセル</button>
                <button id="notify-save-btn" class="primary-btn">保存する</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="script/store.js"></script>
    <script src="script/celebrationEngine.js"></script>
    <script src="script/celebrationScore.js"></script>
    <script src="script/soundManager.js"></script>
    
    <script src="script/renderer.js"></script>
    <script src="script/notifier.js"></script>
    <script src="script/effectManager.js"></script>
    
    <script src="script/todoModal.js"></script>
    <script src="script/dialogs.js"></script>
    <script src="script/settingsModal.js"></script>

    <script src="script/taskManager.js"></script>
    <script src="script/main.js"></script>
</body>
</html>
